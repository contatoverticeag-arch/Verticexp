name: Insight Diário Vértice

on:
  schedule:
    - cron: "0 11 * * 1-5"   # Toda semana Seg–Sex às 8h BRT (11h UTC)
  workflow_dispatch:           # Aparece botão "Run workflow" para testar manualmente

jobs:
  gerar-insight:
    runs-on: ubuntu-latest

    permissions:
      contents: write           # Necessário para fazer git push

    steps:
      - name: 📥 Baixar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: pip install requests

      - name: 🤖 Gerar insight com Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/gerar_insight.py

      - name: 💾 Salvar insight no repositório
        run: |
          git config --global user.email "bot@contatoverticeag.com.br"
          git config --global user.name "Vértice Bot"
          git add public/insight-do-dia.json
          git diff --staged --quiet || git commit -m "insight: $(date +'%Y-%m-%d')"
          git push
