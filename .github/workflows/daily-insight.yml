name: Insight Diário Vértice

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

jobs:
  gerar-insight:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar insight com Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/gerar_insight.py

      - name: Salvar no repositório
        run: |
          git config --global user.email "bot@vertice.com.br"
          git config --global user.name "Vértice Bot"
          git add public/insight-do-dia.json
          git diff --staged --quiet || git commit -m "insight: $(date +'%Y-%m-%d')"
          git push
